<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo icon -->
  <rect x="80" y="80" width="56" height="56" rx="14" fill="url(#accent)"/>
  <rect x="92" y="112" width="8" height="18" rx="2" fill="white"/>
  <rect x="104" y="102" width="8" height="28" rx="2" fill="white"/>
  <rect x="116" y="92" width="8" height="38" rx="2" fill="white"/>

  <!-- Title -->
  <text x="152" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">CRS Score Visualizer</text>
  <text x="152" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748b">Express Entry Calculator</text>

  <!-- Main score display -->
  <text x="600" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="800" fill="#f1f5f9" text-anchor="middle" opacity="0.15">CRS</text>

  <!-- Score breakdown bars (decorative) -->
  <g transform="translate(80, 200)">
    <!-- Core -->
    <text x="0" y="15" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Core</text>
    <rect x="80" y="0" width="420" height="22" rx="6" fill="url(#bar1)" opacity="0.9"/>
    <text x="510" y="15" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#60a5fa">420</text>

    <!-- Spouse -->
    <text x="0" y="55" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Spouse</text>
    <rect x="80" y="40" width="40" height="22" rx="6" fill="url(#bar2)" opacity="0.9"/>
    <text x="130" y="55" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa">40</text>

    <!-- Skill -->
    <text x="0" y="95" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Skill</text>
    <rect x="80" y="80" width="100" height="22" rx="6" fill="url(#bar3)" opacity="0.9"/>
    <text x="190" y="95" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#34d399">100</text>

    <!-- Bonus -->
    <text x="0" y="135" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Bonus</text>
    <rect x="80" y="120" width="80" height="22" rx="6" fill="url(#bar4)" opacity="0.9"/>
    <text x="170" y="135" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fb923c">80</text>
  </g>

  <!-- Decorative chart on right -->
  <g transform="translate(650, 190)">
    <!-- Mini line chart -->
    <polyline points="0,120 40,100 80,110 120,80 160,90 200,60 240,70 280,40 320,50 360,30 400,45 440,20" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.6"/>
    <line x1="0" y1="70" x2="440" y2="70" stroke="#f97316" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
    <text x="445" y="24" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Cutoff</text>
    <text x="445" y="74" font-family="system-ui, sans-serif" font-size="11" fill="#f97316">You</text>
  </g>

  <!-- Features list -->
  <g transform="translate(80, 420)">
    <rect x="0" y="0" width="180" height="32" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="14" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">7 Visualizations</text>

    <rect x="195" y="0" width="180" height="32" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="209" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Real IRCC Data</text>

    <rect x="390" y="0" width="180" height="32" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="404" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">What-If Simulator</text>

    <rect x="585" y="0" width="180" height="32" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="599" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Score Comparison</text>
  </g>

  <!-- URL -->
  <text x="80" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#3b82f6">manvu.ca/crs-tool</text>
  <text x="80" y="555" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Calculate your Express Entry score with interactive data visualizations</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>
